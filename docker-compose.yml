services:

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: iot_app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - RESET_TOKEN_EXPIRE_MINUTES=${RESET_TOKEN_EXPIRE_MINUTES:-15}
      - DATABASE_URL=postgresql+asyncpg://iotuser:iotpassword@db:5432/iotdb
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM:-noreply@iot-security-suite.dev}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_SERVER=${MAIL_SERVER:-sandbox.smtp.mailtrap.io}
      - MAIL_STARTTLS=${MAIL_STARTTLS:-True}
      - MAIL_SSL_TLS=${MAIL_SSL_TLS:-False}
      - RATE_LIMIT_MAX_ATTEMPTS=${RATE_LIMIT_MAX_ATTEMPTS:-5}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - iot_network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: iot_db
    environment:
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: iotpassword
      POSTGRES_DB: iotdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotuser -d iotdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iot_network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: iot_mailhog
    ports:
      - "1025:1025"   # SMTP — app sends emails here
      - "8025:8025"   # Web UI — view caught emails at http://localhost:8025
    networks:
      - iot_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  iot_network:
    driver: bridge
